<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrowGray" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 z" fill="#bdbdbd"/>
    </marker>
    <style>
      .title { font: 700 58px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 700 44px Arial, Helvetica, sans-serif; fill: #111; }
      .item  { font: 500 46px Arial, Helvetica, sans-serif; fill: #111; }
      .cap   { font: 500 56px Georgia, "Times New Roman", serif; fill: #111; }
      .box { fill: none; stroke: #1f1f1f; stroke-width: 4; }
      .arrow { stroke: #bdbdbd; stroke-width: 14; fill: none; marker-end: url(#arrowGray); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#e8e8e8"/>

  <text class="title" x="800" y="80" text-anchor="middle">Data Preparation Workflow</text>

  <!-- Corpora -->
  <rect class="box" x="90" y="140" rx="52" ry="52" width="380" height="540"/>
  <text class="title" x="280" y="155" text-anchor="middle">Corpora</text>

  <rect x="145" y="245" width="270" height="82" fill="#e9c7c7"/>
  <text class="item" x="280" y="302" text-anchor="middle">Textbooks</text>

  <rect x="145" y="375" width="270" height="82" fill="#f1dddd"/>
  <text class="item" x="280" y="432" text-anchor="middle">Cleaned Text</text>

  <rect x="145" y="505" width="270" height="82" fill="#edd9c0"/>
  <text class="item" x="280" y="562" text-anchor="middle">Corpus JSONL</text>

  <!-- Chunking -->
  <rect class="box" x="610" y="140" rx="52" ry="52" width="380" height="540"/>
  <text class="title" x="800" y="155" text-anchor="middle">Chunking</text>

  <rect x="665" y="215" width="270" height="82" fill="#edd9c0"/>
  <text class="item" x="800" y="272" text-anchor="middle">Section Split</text>

  <rect x="665" y="345" width="270" height="82" fill="#f0dfca"/>
  <text class="item" x="800" y="402" text-anchor="middle">Size + Overlap</text>

  <rect x="665" y="475" width="270" height="82" fill="#e8c2c2"/>
  <text class="item" x="800" y="532" text-anchor="middle">Metadata Tags</text>

  <!-- Indexing -->
  <rect class="box" x="1130" y="140" rx="52" ry="52" width="380" height="540"/>
  <text class="title" x="1320" y="155" text-anchor="middle">Embedding + Indexing</text>

  <rect x="1185" y="215" width="270" height="82" fill="#e7c4c4"/>
  <text class="item" x="1320" y="272" text-anchor="middle">BGE Index</text>

  <rect x="1185" y="345" width="270" height="82" fill="#f0dcdc"/>
  <text class="item" x="1320" y="402" text-anchor="middle">MedEmbed Index</text>

  <rect x="1185" y="475" width="270" height="82" fill="#ecd7bd"/>
  <text class="item" x="1320" y="532" text-anchor="middle">Dense + Hybrid</text>

  <!-- Labels -->
  <text class="label" x="545" y="380" text-anchor="middle">Preprocessing</text>
  <text class="label" x="1065" y="380" text-anchor="middle">Index Build</text>

  <!-- Arrows -->
  <line class="arrow" x1="485" y1="390" x2="590" y2="390"/>
  <line class="arrow" x1="1005" y1="390" x2="1110" y2="390"/>

  <!-- Footer -->
  <text class="cap" x="800" y="920" text-anchor="middle">Figure: Corpora to chunking and indexing workflow (Textbooks-only corpus).</text>
</svg>
