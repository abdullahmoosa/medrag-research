<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1300" viewBox="0 0 2200 1300">
  <defs>
    <marker id="arrowGray" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 z" fill="#bdbdbd"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .txt { font: 500 28px Arial, Helvetica, sans-serif; fill: #111; }
      .tiny { font: 500 24px Arial, Helvetica, sans-serif; fill: #333; }
      .cap { font: 500 42px Georgia, "Times New Roman", serif; fill: #111; }
      .grp { fill: none; stroke: #1f1f1f; stroke-width: 4; }
      .stepA { fill: #edd9c0; }
      .stepB { fill: #f0dfca; }
      .stepC { fill: #e8c2c2; }
      .stepD { fill: #f2dddd; }
      .stepE { fill: #dcd5e3; }
      .node { stroke: #666; stroke-width: 1.2; }
      .arrow { stroke: #bdbdbd; stroke-width: 12; fill: none; marker-end: url(#arrowGray); }
      .loop { stroke: #9ea0a4; stroke-width: 8; fill: none; marker-end: url(#arrowGray); }
    </style>
  </defs>

  <rect x="0" y="0" width="2200" height="1300" fill="#e8e8e8"/>
  <text class="title" x="1100" y="80" text-anchor="middle">Detailed Section-wise Chunking Workflow (Implemented Pipeline)</text>

  <!-- Left lane: cleaning + structure -->
  <rect class="grp" x="60" y="130" rx="38" ry="38" width="560" height="980"/>
  <text class="subtitle" x="340" y="155" text-anchor="middle">Text Preparation</text>

  <rect class="node stepE" x="120" y="210" width="440" height="86" rx="12"/>
  <text class="txt" x="340" y="266" text-anchor="middle">Raw textbook .txt file</text>

  <rect class="node stepA" x="120" y="340" width="440" height="160" rx="12"/>
  <text class="label" x="340" y="388" text-anchor="middle">Clean Text</text>
  <text class="tiny" x="340" y="428" text-anchor="middle">remove figures, page numbers, references</text>
  <text class="tiny" x="340" y="462" text-anchor="middle">remove URLs/emails/copyright, normalize whitespace</text>

  <rect class="node stepB" x="120" y="550" width="440" height="210" rx="12"/>
  <text class="label" x="340" y="600" text-anchor="middle">Structure Splitter</text>
  <text class="tiny" x="340" y="640" text-anchor="middle">split into chapters (regex patterns)</text>
  <text class="tiny" x="340" y="674" text-anchor="middle">split chapter into sections (header detection)</text>
  <text class="tiny" x="340" y="708" text-anchor="middle">preserve hierarchy: textbook/chapter/section</text>

  <rect class="node stepC" x="120" y="810" width="440" height="150" rx="12"/>
  <text class="label" x="340" y="858" text-anchor="middle">Section Queue</text>
  <text class="tiny" x="340" y="896" text-anchor="middle">iterate each TextSection independently</text>
  <text class="tiny" x="340" y="930" text-anchor="middle">(allow_cross_section=False)</text>

  <!-- Center lane: section chunking core -->
  <rect class="grp" x="680" y="130" rx="38" ry="38" width="1040" height="980"/>
  <text class="subtitle" x="1200" y="155" text-anchor="middle">Per-Section Semantic Chunk Builder</text>

  <rect class="node stepB" x="760" y="210" width="880" height="90" rx="12"/>
  <text class="txt" x="1200" y="268" text-anchor="middle">Split section text into paragraphs using blank lines (\n\n); discard paragraphs &lt; 3 words</text>

  <rect class="node stepA" x="760" y="340" width="880" height="90" rx="12"/>
  <text class="txt" x="1200" y="398" text-anchor="middle">Token count each paragraph (tiktoken cl100k_base; fallback approx len(text)/4)</text>

  <!-- decision diamonds -->
  <polygon class="node stepD" points="1200,465 1325,535 1200,605 1075,535"/>
  <text class="tiny" x="1200" y="526" text-anchor="middle">Paragraph</text>
  <text class="tiny" x="1200" y="558" text-anchor="middle">tokens &gt; max?</text>

  <rect class="node stepC" x="760" y="640" width="880" height="95" rx="12"/>
  <text class="txt" x="1200" y="700" text-anchor="middle">YES: split long paragraph by sentence; emit sub-chunks bounded by max_tokens</text>

  <polygon class="node stepD" points="1200,770 1340,845 1200,920 1060,845"/>
  <text class="tiny" x="1200" y="836" text-anchor="middle">current_tokens + para_tokens</text>
  <text class="tiny" x="1200" y="868" text-anchor="middle">&gt; max_tokens ?</text>

  <rect class="node stepB" x="760" y="950" width="880" height="125" rx="12"/>
  <text class="tiny" x="1200" y="1000" text-anchor="middle">if current chunk >= min_tokens: finalize chunk</text>
  <text class="tiny" x="1200" y="1036" text-anchor="middle">append paragraph to current chunk; if current >= target_tokens: finalize immediately</text>

  <!-- Right lane: post processing + outputs -->
  <rect class="grp" x="1780" y="130" rx="38" ry="38" width="360" height="980"/>
  <text class="subtitle" x="1960" y="155" text-anchor="middle">Post-process + Output</text>

  <rect class="node stepA" x="1835" y="220" width="250" height="160" rx="12"/>
  <text class="label" x="1960" y="270" text-anchor="middle">Section End</text>
  <text class="tiny" x="1960" y="308" text-anchor="middle">finalize remainder</text>
  <text class="tiny" x="1960" y="342" text-anchor="middle">if tokens >= min</text>

  <rect class="node stepB" x="1835" y="420" width="250" height="200" rx="12"/>
  <text class="label" x="1960" y="472" text-anchor="middle">Optional</text>
  <text class="tiny" x="1960" y="510" text-anchor="middle">Overlap within same</text>
  <text class="tiny" x="1960" y="542" text-anchor="middle">(textbook,chapter,section)</text>
  <text class="tiny" x="1960" y="576" text-anchor="middle">tokens/sentences strategy</text>

  <rect class="node stepC" x="1835" y="660" width="250" height="130" rx="12"/>
  <text class="tiny" x="1960" y="712" text-anchor="middle">Optional tiny-chunk filter</text>
  <text class="tiny" x="1960" y="746" text-anchor="middle">filter_min_tokens</text>

  <rect class="node stepD" x="1835" y="830" width="250" height="120" rx="12"/>
  <text class="tiny" x="1960" y="878" text-anchor="middle">Validation + stats</text>
  <text class="tiny" x="1960" y="912" text-anchor="middle">min/max checks</text>

  <rect class="node stepE" x="1835" y="980" width="250" height="95" rx="12"/>
  <text class="tiny" x="1960" y="1038" text-anchor="middle">SemanticChunk JSONL</text>

  <!-- arrows left lane -->
  <line class="arrow" x1="340" y1="296" x2="340" y2="332"/>
  <line class="arrow" x1="340" y1="500" x2="340" y2="542"/>
  <line class="arrow" x1="340" y1="760" x2="340" y2="802"/>
  <line class="arrow" x1="570" y1="885" x2="740" y2="885"/>

  <!-- center arrows -->
  <line class="arrow" x1="1200" y1="300" x2="1200" y2="332"/>
  <line class="arrow" x1="1200" y1="430" x2="1200" y2="458"/>
  <line class="arrow" x1="1200" y1="605" x2="1200" y2="632"/>
  <line class="arrow" x1="1200" y1="735" x2="1200" y2="763"/>
  <line class="arrow" x1="1200" y1="920" x2="1200" y2="942"/>

  <!-- yes/no labels + side arrows -->
  <text class="tiny" x="1345" y="518">NO</text>
  <text class="tiny" x="1005" y="518">YES</text>
  <line class="arrow" x1="1070" y1="535" x2="860" y2="535"/>
  <line class="arrow" x1="860" y1="535" x2="860" y2="635"/>

  <text class="tiny" x="1360" y="834">YES/NO path</text>
  <line class="loop" x1="1648" y1="1012" x2="1710" y2="1012"/>
  <line class="loop" x1="1710" y1="1012" x2="1710" y2="270"/>
  <line class="loop" x1="1710" y1="270" x2="1648" y2="270"/>
  <text class="tiny" x="1722" y="648" transform="rotate(90 1722,648)">next paragraph / next section loop</text>

  <!-- to right lane -->
  <line class="arrow" x1="1640" y1="1008" x2="1822" y2="1008"/>
  <line class="arrow" x1="1960" y1="380" x2="1960" y2="412"/>
  <line class="arrow" x1="1960" y1="620" x2="1960" y2="652"/>
  <line class="arrow" x1="1960" y1="790" x2="1960" y2="822"/>
  <line class="arrow" x1="1960" y1="950" x2="1960" y2="972"/>

  <!-- config callout -->
  <rect class="node" x="740" y="1125" width="1440" height="125" rx="14" fill="#f4f4f4"/>
  <text class="tiny" x="760" y="1166">Config knobs used by section-wise chunking:</text>
  <text class="tiny" x="760" y="1200">min/target/max tokens (default 120/220/350; match-previous config 150/250/400), allow_cross_section=False, preserve_structure=True,</text>
  <text class="tiny" x="760" y="1234">enable_overlap (default False), overlap_ratio/strategy, filter_min_tokens, validate_chunks.</text>

  <text class="cap" x="1100" y="1282" text-anchor="middle">Figure: Implementation-level section-wise chunking workflow used in this project.</text>
</svg>
