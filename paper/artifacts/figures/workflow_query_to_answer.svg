<svg xmlns="http://www.w3.org/2000/svg" width="2120" height="980" viewBox="0 0 2120 980">
  <defs>
    <marker id="arrowGray" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 z" fill="#bdbdbd"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 700 38px Arial, Helvetica, sans-serif; fill: #111; }
      .item  { font: 500 40px Arial, Helvetica, sans-serif; fill: #111; }
      .cap   { font: 500 54px Georgia, "Times New Roman", serif; fill: #111; }
      .box { fill: none; stroke: #1f1f1f; stroke-width: 4; }
      .arrow { stroke: #bdbdbd; stroke-width: 12; fill: none; marker-end: url(#arrowGray); }
    </style>
  </defs>

  <rect x="0" y="0" width="2120" height="980" fill="#e8e8e8"/>

  <text class="title" x="1060" y="80" text-anchor="middle">Inference Workflow</text>

  <!-- Question -->
  <rect x="80" y="420" rx="20" ry="20" width="230" height="120" fill="#dcd5e3" stroke="#9b8db0" stroke-width="4"/>
  <text class="item" x="195" y="498" text-anchor="middle">Question</text>

  <!-- Reformulation -->
  <rect class="box" x="390" y="150" rx="46" ry="46" width="300" height="650"/>
  <text class="title" x="540" y="165" text-anchor="middle">Reformulation</text>

  <rect x="435" y="250" width="210" height="76" fill="#edd9c0"/>
  <text class="item" x="540" y="303" text-anchor="middle">Raw Query</text>

  <rect x="435" y="365" width="210" height="76" fill="#f0dfca"/>
  <text class="item" x="540" y="418" text-anchor="middle">Rewrite</text>

  <rect x="435" y="480" width="210" height="76" fill="#e8c2c2"/>
  <text class="item" x="540" y="533" text-anchor="middle">Expanded</text>

  <rect x="435" y="595" width="210" height="76" fill="#f1dddd"/>
  <text class="item" x="540" y="648" text-anchor="middle">Final Query</text>

  <!-- Retrieval -->
  <rect class="box" x="760" y="150" rx="46" ry="46" width="300" height="650"/>
  <text class="title" x="910" y="165" text-anchor="middle">Retrieval</text>

  <rect x="805" y="250" width="210" height="76" fill="#edd9c0"/>
  <text class="item" x="910" y="303" text-anchor="middle">Dense</text>

  <rect x="805" y="365" width="210" height="76" fill="#f0dfca"/>
  <text class="item" x="910" y="418" text-anchor="middle">Hybrid</text>

  <rect x="805" y="480" width="210" height="76" fill="#e8c2c2"/>
  <text class="item" x="910" y="533" text-anchor="middle">Reranker</text>

  <rect x="805" y="595" width="210" height="76" fill="#ecd7bd"/>
  <text class="item" x="910" y="648" text-anchor="middle">Top Context</text>

  <!-- Prompting -->
  <rect class="box" x="1130" y="150" rx="46" ry="46" width="300" height="650"/>
  <text class="title" x="1280" y="165" text-anchor="middle">Prompting</text>

  <rect x="1175" y="250" width="210" height="76" fill="#edd9c0"/>
  <text class="item" x="1280" y="303" text-anchor="middle">Template</text>

  <rect x="1175" y="365" width="210" height="76" fill="#f0dfca"/>
  <text class="item" x="1280" y="418" text-anchor="middle">Context Pack</text>

  <rect x="1175" y="480" width="210" height="76" fill="#e8c2c2"/>
  <text class="item" x="1280" y="533" text-anchor="middle">Zero-shot</text>

  <rect x="1175" y="595" width="210" height="76" fill="#f1dddd"/>
  <text class="item" x="1280" y="648" text-anchor="middle">CoT</text>

  <!-- LLM -->
  <rect class="box" x="1500" y="150" rx="46" ry="46" width="300" height="650"/>
  <text class="title" x="1650" y="165" text-anchor="middle">LLM</text>

  <rect x="1545" y="290" width="210" height="82" fill="#edd9c0"/>
  <text class="item" x="1650" y="347" text-anchor="middle">Llama3-Med42</text>

  <rect x="1545" y="430" width="210" height="82" fill="#f0dfca"/>
  <text class="item" x="1650" y="487" text-anchor="middle">Gemma3</text>

  <rect x="1545" y="570" width="210" height="82" fill="#e8c2c2"/>
  <text class="item" x="1650" y="627" text-anchor="middle">Inference</text>

  <!-- Answer -->
  <rect x="1870" y="420" rx="20" ry="20" width="220" height="120" fill="#ebebeb" stroke="#8f8f8f" stroke-width="4"/>
  <text class="item" x="1980" y="498" text-anchor="middle" fill="#444">Answer</text>

  <!-- Stage labels -->
  <text class="label" x="350" y="485" text-anchor="middle">Query Flow</text>
  <text class="label" x="720" y="485" text-anchor="middle">Retrieve</text>
  <text class="label" x="1090" y="485" text-anchor="middle">Build Prompt</text>
  <text class="label" x="1460" y="485" text-anchor="middle">Generate</text>

  <!-- Arrows -->
  <line class="arrow" x1="320" y1="480" x2="370" y2="480"/>
  <line class="arrow" x1="700" y1="480" x2="740" y2="480"/>
  <line class="arrow" x1="1070" y1="480" x2="1110" y2="480"/>
  <line class="arrow" x1="1440" y1="480" x2="1480" y2="480"/>
  <line class="arrow" x1="1810" y1="480" x2="1850" y2="480"/>

  <!-- Footer -->
  <text class="cap" x="1060" y="920" text-anchor="middle">Figure: Query to answer workflow with reformulation, retrieval, prompting, and LLM generation.</text>
</svg>
